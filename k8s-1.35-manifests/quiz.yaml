---
apiVersion: v1
kind: Namespace
metadata:
  name: quiz-prod
  labels:
    name: quiz-prod

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quiz
  namespace: quiz-prod
  labels:
    app: quiz
    environment: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: quiz
      environment: production
  template:
    metadata:
      labels:
        app: quiz
        environment: production
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        supplementalGroups:
        - 995
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: quiz
        image: dremer10/quiz-terminal:${QUIZ_IMAGE_TAG}
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        ports:
        - containerPort: 7681
          name: ws
        env:
        - name: DEFAULT_TOPIC
          value: "aws"
        resources:
          requests:
            cpu: "50m"
            memory: "256Mi"
          limits:
            cpu: "50m"
            memory: "256Mi"
        volumeMounts:
        - name: docker-sock
          mountPath: /var/run/docker.sock
          readOnly: true
        - name: quiz-tmp
          mountPath: /tmp
      volumes:
      - name: docker-sock
        hostPath:
          path: /var/run/docker.sock
          type: Socket
      - name: quiz-tmp
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: quiz
  namespace: quiz-prod
  labels:
    app: quiz
    environment: production
spec:
  type: ClusterIP
  selector:
    app: quiz
    environment: production
  ports:
  - port: 7681
    targetPort: 7681
    protocol: TCP
    name: ws

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: quiz
  namespace: quiz-prod
spec:
  parentRefs:
  - name: global-gateway
    namespace: nginx-gateway
  hostnames:
  - quiz.dremer10.com
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: quiz
      port: 7681
